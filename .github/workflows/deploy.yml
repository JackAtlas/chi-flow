name: Deploy to Cloud

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the project
        run: pnpm build

      - name: Package files
        run: |
          mkdir -p deploy
          cp -r apps/web/.next/standalone/* deploy/

          mkdir -p deploy/.next
          cp -r apps/web/.next/static deploy/.next/static

          cp -r apps/web/public deploy/public

          mkdir -p deploy/prisma
          cp -r prisma deploy/
          cp -r prisma.config.ts deploy/

      - name: Upload to Server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'release.tar.gz'
          target: '/var/www/chi-flow'

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/chi-flow

            pnpm install --frozen-lockfile

            pnpm prisma generate

            pm2 restart chi-flow || pm2 start pnpm --name "chi-flow" -- start

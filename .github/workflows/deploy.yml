name: Deploy to Cloud

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the project
        run: pnpm build
        env:
          NEXT_PUBLIC_DEMO_PASSWORD: ${{ vars.NEXT_PUBLIC_DEMO_PASSWORD }}
          NEXT_PUBLIC_AVATAR_URL: ${{ vars.NEXT_PUBLIC_AVATAR_URL }}

      - name: Package files
        run: |
          mkdir -p deploy
          cp -r apps/web/.next deploy/
          cp -r apps/web/prisma deploy/

          cp apps/web/package.json deploy/
          cp apps/web/next.config.ts deploy/

          cp package.json deploy/
          cp pnpm-lock.yaml deploy/
          cp pnpm-workspace.yaml deploy/

          cp -r packages deploy/

      - name: Upload to Server via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'deploy'
          target: '/var/www/chi-flow'

      - name: Deploy on Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/chi-flow

            export NODE_ENV=production

            pm2 restart chi-flow || pm2 start "pnpm --filter web start -- --port 3002" --name chi-flow

            pm2 save
